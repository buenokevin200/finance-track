server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types;

    # Explicitly set types in case mime.types is missing or incomplete
    types {
        text/css css;
        application/javascript js;
        image/svg+xml svg;
        image/png png;
        image/jpeg jpg;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Better asset handling
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    location /health {
        access_log off;
        return 200 'healthy';
    }

    # Proxy API requests to avoid CORS and match dev environment behavior
    location /api/v1/ {
        proxy_pass https://firefly.cacoebloke.shop/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host firefly.cacoebloke.shop;
        proxy_cache_bypass $http_upgrade;

        # Fix for 502 errors when proxying between containers
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        # Headers to maintain request context
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_log /dev/stderr debug;
}
