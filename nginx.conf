server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log /dev/stdout;
        add_header 'Content-Type' 'text/plain';
        return 200 'healthy';
    }

    # Proxy API requests to avoid CORS and match dev environment behavior
    location /api/v1/ {
        proxy_pass https://firefly.cacoebloke.shop/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host firefly.cacoebloke.shop;
        proxy_cache_bypass $http_upgrade;

        # Fix for 502 errors when proxying between containers
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        # Headers to maintain request context
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_log /dev/stderr debug;
}
